<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MySpace Revival V3 💿</title>

<style>

body {

  margin: 0;

  font-family: Verdana;

  background: linear-gradient(#ffb6f0, #000);

  color: white;

}

header {

  text-align: center;

  padding: 10px;

  background: black;

  border-bottom: 3px solid hotpink;

}

.container {

  max-width: 500px;

  margin: auto;

  padding: 10px;

}

.card {

  background: rgba(0,0,0,0.75);

  border: 2px solid hotpink;

  padding: 10px;

  margin-top: 10px;

}

input, button {

  width: 100%;

  padding: 10px;

  margin-top: 5px;

}

button {

  background: hotpink;

  border: none;

  color: white;

}

.post {

  background: rgba(255,255,255,0.1);

  padding: 8px;

  margin-top: 5px;

}

</style>

</head>

<body>

<header>

<h2>💿 MYSPACE REVIVAL V3 💿</h2>

</header>

<div class="container">

<!-- AUTH -->

<div class="card" id="auth">

  <h3>Sign Up / Login</h3>

  <input id="email" placeholder="email">

  <input id="password" placeholder="password" type="password">

  <button onclick="signup()">Sign Up</button>

  <button onclick="login()">Login</button>

</div>

<!-- PROFILE -->

<div class="card" id="profile" style="display:none;">

  <h3 id="userDisplay"></h3>

  <input id="bio" placeholder="write your bio">

  <button onclick="saveBio()">Save Profile</button>

</div>

<!-- POST -->

<div class="card" id="postBox" style="display:none;">

  <input id="postInput" placeholder="what’s on your mind?">

  <button onclick="createPost()">Post</button>

</div>

<!-- FEED -->

<div class="card" id="feed" style="display:none;">

  <h3>🔥 Feed</h3>

  <div id="posts"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG GOES HERE */

const firebaseConfig = {

  apiKey: "YOUR_KEY",

  authDomain: "YOUR_DOMAIN",

  projectId: "YOUR_PROJECT",

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let currentUser = null;

window.signup = async function(){

  let email = document.getElementById("email").value;

  let pass = document.getElementById("password").value;

  await createUserWithEmailAndPassword(auth, email, pass);

  login();

}

window.login = async function(){

  let email = document.getElementById("email").value;

  let pass = document.getElementById("password").value;

  let userCred = await signInWithEmailAndPassword(auth, email, pass);

  currentUser = userCred.user;

  document.getElementById("auth").style.display = "none";

  document.getElementById("profile").style.display = "block";

  document.getElementById("postBox").style.display = "block";

  document.getElementById("feed").style.display = "block";

  document.getElementById("userDisplay").innerText =

    "Welcome 💿 " + currentUser.email;

  loadPosts();

}

window.saveBio = function(){

  alert("Bio saved (you can expand this into Firestore profile storage)");

}

window.createPost = async function(){

  let text = document.getElementById("postInput").value;

  await addDoc(collection(db, "posts"), {

    user: currentUser.email,

    text: text,

    time: Date.now()

  });

  loadPosts();

}

async function loadPosts(){

  let q = query(collection(db, "posts"), orderBy("time", "desc"));

  let snap = await getDocs(q);

  let container = document.getElementById("posts");

  container.innerHTML = "";

  snap.forEach(doc => {

    let p = doc.data();

    let div = document.createElement("div");

    div.className = "post";

    div.innerHTML = "<b>" + p.user + "</b><br>" + p.text;

    container.appendChild(div);

  });

}

</script>

</body>

</html>
